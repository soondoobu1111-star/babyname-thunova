# /etc/nginx/sites-available/babyname-kfortunewave
# Streamlit 앱 → babyname.kfortunewave.com
# WebSocket 지원 필수 (Streamlit)

server {
    listen 80;
    server_name babyname.kfortunewave.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name babyname.kfortunewave.com;

    # SSL — Certbot이 자동 관리
    ssl_certificate     /etc/letsencrypt/live/babyname.kfortunewave.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/babyname.kfortunewave.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # 업로드/타임아웃 (Gemini API 60s 대기)
    client_max_body_size 10M;
    proxy_read_timeout   120s;
    proxy_send_timeout   120s;

    # Streamlit 메인 앱
    location / {
        proxy_pass         http://localhost:8502;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # WebSocket — Streamlit 필수
    location /_stcore/stream {
        proxy_pass         http://localhost:8502/_stcore/stream;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_read_timeout 86400s;
    }
}
